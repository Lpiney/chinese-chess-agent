<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>中国象棋 Agent</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  </head>
  <body>
    <div class="app-shell">
      <section class="board-panel">
        <div class="toolbar">
          <div class="toolbar-left">
            <label for="mode-select">模式</label>
            <select id="mode-select">
              <option value="free" selected>自由对弈</option>
              <option value="course">课程教学</option>
            </select>
            <label for="level-select">Pikafish 难度</label>
            <select id="level-select">
              <option value="beginner">Beginner</option>
              <option value="medium" selected>Medium</option>
              <option value="master">Master</option>
            </select>
          </div>
          <div class="toolbar-right">
            <div id="course-controls" class="hidden">
              <select id="course-select"></select>
              <button id="next-section-btn" class="btn-secondary" type="button">下一节</button>
              <button id="stop-course-btn" class="btn-danger" type="button">退出课程</button>
            </div>
            <button id="reset-btn" type="button">重新开始</button>
          </div>
        </div>

        <div class="board-wrap">
          <svg id="board-svg" viewBox="0 0 620 740" class="board-svg" aria-label="中国象棋棋盘"></svg>
        </div>

        <div id="status-text" class="status-text">正在加载棋局…</div>
        <div class="board-help">操作方式：自由对弈时点击红方棋子并落子；课程模式会把讲解和练习直接显示在右侧聊天区。</div>
      </section>

      <aside class="chat-panel">
        <header class="chat-header">
          <div>
            <h1>Qwen 象棋老师</h1>
            <p>模型：qwen3.6-max-preview</p>
          </div>
        </header>

        <div id="chat-messages" class="chat-messages"></div>

        <div class="chat-composer">
          <div class="chat-actions">
            <button id="quick-ask-btn" class="btn-secondary" type="button">快捷提问</button>
            <button id="clear-chat-btn" class="btn-ghost" type="button">清空聊天</button>
          </div>
          <textarea id="chat-input" placeholder="例如：下一步该怎么走？为什么这步最好？"></textarea>
          <div class="composer-footer">
            <span class="composer-hint">回复会先基于 Pikafish 的当前分析，再由 LLM 解释。</span>
            <button id="send-btn">发送</button>
          </div>
        </div>
      </aside>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
  </html>
